<!DOCTYPE html>
<html lang="he" dir="rtl"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>לוח לידים · Expert Clone</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1b2430; --soft:#5b6675; --line:#e7e3da; --paper:#f6f3ec; --card:#fff;
    --amber:#d98a1f; --amber-d:#b56f12; --teal:#1f8a8f;
    --hot:#e0492f; --warm:#d98a1f; --cold:#3a82c4;
    --shadow:0 10px 30px rgba(20,30,45,.08);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Heebo',sans-serif;background:var(--paper);color:var(--ink);direction:rtl;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:22px 16px 80px}

  /* gate */
  .gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .gate-box{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:38px 32px;max-width:380px;width:100%;text-align:center}
  .gate-box h1{font-size:24px;font-weight:800;margin-bottom:6px}
  .gate-box p{color:var(--soft);font-size:15px;margin-bottom:22px}
  input[type=password],input[type=text]{width:100%;padding:14px 16px;border:1.5px solid var(--line);border-radius:12px;font:inherit;font-size:16px;background:#fbfaf6;text-align:center}
  input:focus{outline:none;border-color:var(--amber)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;font:inherit;font-weight:700;border-radius:12px;padding:13px 22px;background:linear-gradient(135deg,var(--amber),var(--amber-d));color:#fff;transition:.15s}
  .btn:hover{filter:brightness(1.05)}
  .btn.full{width:100%;margin-top:14px}
  .err{color:var(--hot);font-size:14px;margin-top:12px;min-height:18px}

  /* header */
  header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:18px}
  header h1{font-size:26px;font-weight:900}
  header .meta{color:var(--soft);font-size:13px}
  .ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink);border-radius:10px;padding:9px 16px;cursor:pointer;font:inherit;font-weight:600}
  .ghost:hover{border-color:var(--amber)}

  /* kpis */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow)}
  .kpi .n{font-size:30px;font-weight:900;line-height:1}
  .kpi .l{color:var(--soft);font-size:13px;font-weight:500;margin-top:6px}
  .kpi.hot .n{color:var(--hot)} .kpi.money .n{color:var(--teal)}

  /* controls */
  .controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .chip{background:#fff;border:1.5px solid var(--line);border-radius:999px;padding:7px 15px;cursor:pointer;font-weight:600;font-size:14px;color:var(--soft)}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .controls .spacer{flex:1}
  select{padding:8px 12px;border:1.5px solid var(--line);border-radius:10px;font:inherit;font-weight:600;background:#fff}

  /* lead cards */
  .lead{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:16px 18px;margin-bottom:12px;display:grid;grid-template-columns:48px 1fr auto;gap:14px;align-items:center;position:relative;overflow:hidden}
  .lead .stripe{position:absolute;top:0;right:0;bottom:0;width:5px}
  .lead.hot .stripe{background:var(--hot)} .lead.warm .stripe{background:var(--warm)} .lead.cold .stripe{background:var(--cold)}
  .lead.done{opacity:.55}
  .rank{font-size:20px;font-weight:900;color:var(--soft);text-align:center}
  .main .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .name{font-size:18px;font-weight:800}
  .heat{font-size:12px;font-weight:800;border-radius:999px;padding:3px 10px;color:#fff}
  .heat.hot{background:var(--hot)} .heat.warm{background:var(--warm)} .heat.cold{background:var(--cold)}
  .sub{color:var(--soft);font-size:13px;margin-top:5px;display:flex;gap:12px;flex-wrap:wrap}
  .sub b{color:var(--ink)}
  .answers{margin-top:8px;font-size:13px;color:var(--ink);background:#f1f6f6;border:1px solid #dde9e9;border-radius:9px;padding:7px 11px;display:inline-block}
  .answers b{color:var(--teal);font-weight:700} .answers .dot{color:var(--soft);margin:0 8px}
  .chips{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
  .gap{background:#fbeede;color:var(--amber-d);border:1px solid #f0dcbf;border-radius:7px;padding:2px 8px;font-size:12px;font-weight:600}
  .actions{display:flex;flex-direction:column;gap:7px;align-items:stretch;min-width:128px}
  .wa{background:#25d366;color:#fff;border:none;border-radius:10px;padding:9px 12px;font:inherit;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;font-size:14px}
  .call{background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:8px 12px;font:inherit;font-weight:600;cursor:pointer;text-decoration:none;text-align:center;color:var(--ink);font-size:14px}
  .actions select{font-size:13px;padding:7px 8px}
  .barwrap{height:6px;background:#eee;border-radius:4px;width:90px;overflow:hidden;display:inline-block;vertical-align:middle}
  .bar{height:100%;background:linear-gradient(90deg,var(--amber),var(--teal))}
  .empty{text-align:center;color:var(--soft);padding:60px 20px;font-size:16px}
  @media(max-width:680px){.kpis{grid-template-columns:repeat(2,1fr)}.lead{grid-template-columns:1fr;gap:10px}.rank{text-align:right}.actions{flex-direction:row;min-width:0}}
</style></head>
<body>

<!-- GATE -->
<div class="gate" id="gate">
  <div class="gate-box">
    <h1>🔐 לוח לידים</h1>
    <p>Expert Clone · הזן את סיסמת הלוח</p>
    <input type="password" id="pass" placeholder="סיסמה" autocomplete="off">
    <button class="btn full" id="enter">כניסה</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="wrap" id="app" style="display:none">
  <header>
    <div>
      <h1>🔥 לוח לידים · למי לחזור קודם</h1>
      <div class="meta" id="updated"></div>
    </div>
    <div>
      <button class="ghost" id="refresh">↻ רענן</button>
      <button class="ghost" id="logout">יציאה</button>
    </div>
  </header>

  <div class="kpis">
    <div class="kpi"><div class="n" id="k-total">—</div><div class="l">סה"כ לידים</div></div>
    <div class="kpi hot"><div class="n" id="k-hot">—</div><div class="l">🔥 חמים</div></div>
    <div class="kpi money"><div class="n" id="k-money">—</div><div class="l">₪/חודש בסיכון</div></div>
    <div class="kpi"><div class="n" id="k-today">—</div><div class="l">נכנסו היום</div></div>
  </div>

  <div class="controls">
    <span class="chip on" data-f="all">הכל</span>
    <span class="chip" data-f="hot">🔥 חם</span>
    <span class="chip" data-f="warm">🟡 פושר</span>
    <span class="chip" data-f="cold">🔵 קר</span>
    <span class="chip" data-f="todo">לטיפול</span>
    <span class="chip" data-f="done">נסגרו</span>
    <span class="spacer"></span>
    <select id="sort">
      <option value="heat">מיון: חום (מומלץ)</option>
      <option value="money">מיון: כסף בסיכון</option>
      <option value="recent">מיון: הכי טרי</option>
    </select>
  </div>

  <div id="list"></div>
</div>

<script>
const ENDPOINT = "https://lgixufkqkwdbksbohnxu.supabase.co/functions/v1/lead";
const ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnaXh1Zmtxa3dkYmtzYm9obnh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMjUxNzYsImV4cCI6MjA5NzYwMTE3Nn0.ig176ITZQfuodxSfktIHEqOxpb4a_dFEt1KsvWr823g";
const SK_PASS = "ec_inbox_pass", SK_STATUS = "ec_lead_status";

let leads = [], filter = "all";
const statusMap = JSON.parse(localStorage.getItem(SK_STATUS) || "{}");
const STATUSES = {new:"חדש", contacted:"יצרתי קשר", followup:"במעקב", won:"נסגר ✅", lost:"לא רלוונטי"};

const $ = s => document.querySelector(s);
function he(n){ return (n==null?0:n).toLocaleString("he-IL"); }

function timeAgo(iso){
  const d = (Date.now() - new Date(iso).getTime())/1000;
  if (d < 3600) return "לפני " + Math.max(1,Math.round(d/60)) + " דק'";
  if (d < 86400) return "לפני " + Math.round(d/3600) + " שע'";
  return "לפני " + Math.round(d/86400) + " ימים";
}
function gapsOf(l){ return (l.diagnoses||"").split(" · ").map(s=>s.trim()).filter(Boolean); }

function heatOf(l){
  const gaps = gapsOf(l).length;                       // 0-8
  const money = +l.money_lost || 0;
  const days = (Date.now() - new Date(l.created_at).getTime())/86400000;
  const moneyScore = Math.min(money/30000,1)*40;       // ₪30k+/חודש => מקס
  const painScore  = (gaps/8)*25;                       // יותר חוסרים => יותר כאב
  const recScore   = 25*Math.exp(-days/7);             // טרי => חם
  const engScore   = (l.source==="diagnostic")?10:4;   // השלים אבחון => אות חזק
  return Math.round(moneyScore+painScore+recScore+engScore);
}
function bucket(h){ return h>=70?"hot":h>=40?"warm":"cold"; }
function bucketHe(b){ return b==="hot"?"🔥 חם":b==="warm"?"🟡 פושר":"🔵 קר"; }

function waLink(l){
  const first = (l.name||"").split(" ")[0] || "";
  const top = gapsOf(l)[0] || "אחוזי הסיום";
  const msg = `היי ${first}, כאן הלל 🙏 ראיתי שעשית את אבחון הקורס הדיגיטלי. שמתי לב שיש כמה נקודות שמדממות לך אחוזי סיום (כמו ${top}). יש לי 2-3 דקות לעבור על זה איתך, מתי נוח לדבר?`;
  const phone = (l.phone||"").replace(/[^0-9]/g,"").replace(/^0/,"972");
  return "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg);
}

function setStatus(id,v){ statusMap[id]=v; localStorage.setItem(SK_STATUS, JSON.stringify(statusMap)); render(); }

async function load(){
  const pass = sessionStorage.getItem(SK_PASS);
  $("#updated").textContent = "טוען…";
  try{
    const r = await fetch(ENDPOINT + "?inbox=" + encodeURIComponent(pass) + "&limit=500",
      { headers:{ "apikey":ANON, "Authorization":"Bearer "+ANON } });
    if (r.status===401){ logout("סיסמה שגויה"); return; }
    const data = await r.json();
    leads = (data.leads||[]).filter(l=>l.phone);     // רק לידים עם טלפון לחזרה
    $("#updated").textContent = "עודכן " + new Date().toLocaleTimeString("he-IL") + " · " + leads.length + " לידים";
    render();
  }catch(e){ $("#updated").textContent = "שגיאת רשת · נסה רענון"; }
}

function render(){
  // kpis
  const today = new Date().toDateString();
  const withHeat = leads.map(l=>({...l, _h:heatOf(l), _b:bucket(heatOf(l))}));
  $("#k-total").textContent = withHeat.length;
  $("#k-hot").textContent = withHeat.filter(l=>l._b==="hot").length;
  $("#k-money").textContent = "₪" + he(withHeat.reduce((s,l)=>s+(+l.money_lost||0),0));
  $("#k-today").textContent = withHeat.filter(l=>new Date(l.created_at).toDateString()===today).length;

  // filter
  let rows = withHeat.filter(l=>{
    const st = statusMap[l.id]||"new";
    if (filter==="all") return true;
    if (filter==="todo") return st==="new"||st==="followup";
    if (filter==="done") return st==="won"||st==="lost";
    return l._b===filter;
  });
  // sort
  const sort = $("#sort").value;
  rows.sort((a,b)=> sort==="money" ? (+b.money_lost||0)-(+a.money_lost||0)
                  : sort==="recent" ? new Date(b.created_at)-new Date(a.created_at)
                  : b._h-a._h);

  const list = $("#list");
  if (!rows.length){ list.innerHTML = '<div class="empty">אין לידים בקטגוריה הזו עדיין.</div>'; return; }
  list.innerHTML = rows.map((l,i)=>{
    const gaps = gapsOf(l), st = statusMap[l.id]||"new";
    const sz = (l.payload && l.payload.sizing) || {};
    const have = Number.isFinite(+(l.payload && l.payload.have)) ? +l.payload.have : Math.max(0, 8 - gaps.length);
    const done = (st==="won"||st==="lost");
    const opts = Object.entries(STATUSES).map(([k,v])=>`<option value="${k}" ${st===k?"selected":""}>${v}</option>`).join("");
    return `<div class="lead ${l._b} ${done?"done":""}">
      <div class="stripe"></div>
      <div class="rank">${i+1}</div>
      <div class="main">
        <div class="top">
          <span class="name">${l.name||"ללא שם"}</span>
          <span class="heat ${l._b}">${bucketHe(l._b)} · ${l._h}</span>
        </div>
        <div class="sub">
          <span>📊 <b>${have}/8</b> <span class="barwrap"><span class="bar" style="width:${have/8*100}%"></span></span></span>
          <span>💸 <b>₪${he(+l.money_lost||0)}</b>/חודש</span>
          <span>🕐 ${timeAgo(l.created_at)}</span>
          <span>📍 ${(l.utm&&l.utm.utm_campaign)||l.source||"—"}</span>
        </div>
        ${(sz.students||sz.completion||sz.recommend)?`<div class="answers">🧑‍🎓 תלמידים: <b>${sz.students||"—"}</b><span class="dot">·</span>🎓 מסיימים: <b>${sz.completion||"—"}</b><span class="dot">·</span>⭐ ממליצים: <b>${sz.recommend||"—"}</b></div>`:""}
        ${gaps.length?`<div class="chips">${gaps.slice(0,4).map(g=>`<span class="gap">${g}</span>`).join("")}</div>`:""}
      </div>
      <div class="actions">
        <a class="wa" href="${waLink(l)}" target="_blank">💬 וואטסאפ</a>
        <a class="call" href="tel:${l.phone}">📞 ${l.phone}</a>
        <select onchange="setStatus('${l.id}',this.value)">${opts}</select>
      </div>
    </div>`;
  }).join("");
}

// gate
function enter(){
  const v = $("#pass").value.trim();
  if (!v){ $("#gateErr").textContent="הזן סיסמה"; return; }
  sessionStorage.setItem(SK_PASS, v);
  $("#gate").style.display="none"; $("#app").style.display="block";
  load();
}
function logout(msg){
  sessionStorage.removeItem(SK_PASS);
  $("#app").style.display="none"; $("#gate").style.display="flex";
  $("#gateErr").textContent = msg||"";
  $("#pass").value="";
}
$("#enter").onclick = enter;
$("#pass").addEventListener("keydown",e=>{ if(e.key==="Enter") enter(); });
$("#logout").onclick = ()=>logout();
$("#refresh").onclick = load;
$("#sort").onchange = render;
document.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{
  filter=c.dataset.f; document.querySelectorAll(".chip").forEach(x=>x.classList.toggle("on",x===c)); render();
});
setInterval(()=>{ if($("#app").style.display!=="none") load(); }, 60000);

// auto-resume if session pass exists
if (sessionStorage.getItem(SK_PASS)){ $("#gate").style.display="none"; $("#app").style.display="block"; load(); }
</script>
</body></html>
